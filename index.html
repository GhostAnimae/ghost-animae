<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GhostAnimae</title>

  <link rel="stylesheet" href="Css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>

  <section class="hero">
    <video autoplay muted loop playsinline class="back_video">
      <source src="images/Ghost Animae - Concrete Roses.mp4" type="video/mp4">
    </video>

    <nav class="top_nav">
      <div class="logo">
        <a href="https://instagram.com/ghostanimae" target="_blank" rel="noopener noreferrer">
          <img src="images/GhostAnimae Logo.jpg" alt="Ghost Animae Logo">
        </a>
      </div>

      <ul>
        <li><a href="#">Coming Soon</a></li>
      </ul>

      <a class="cta" href="https://youtube.com/ghostanimae" target="_blank" rel="noopener noreferrer">
        <button type="button">Subscribe</button>
      </a>
    </nav>

    <div class="content">
      <h1>
        <span class="main-title">GhostAnimae</span>
        <span class="sub-title"></span>
      </h1>

      <a href="#" id="collabBtn">Collab</a>
    </div>
  </section>

  <div id="collabModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>

      <h2>Let's Collab!</h2>
      <p>Fill out the form and we'll get back to you.</p>

      <form id="collabForm" action="https://formspree.io/f/xnjgyllr" method="POST">
        <div class="input_box">
          <input type="text" name="name" placeholder="Your Name" required>
        </div>

        <div class="input_box">
          <input type="email" name="email" placeholder="Email" required>
        </div>

        <div class="input_box">
          <input type="text" name="portfolio" placeholder="Portfolio / Social Media (optional)">
        </div>

        <div class="input_box">
          <textarea name="message" placeholder="Message / Collab Idea" rows="4" required></textarea>
        </div>

        <button type="submit" class="button2">Submit</button>
      </form>
    </div>
  </div>

  <footer class="site-footer">
    &copy; 2026 Ghost Animae Recordings LLC — All Rights Reserved
  </footer>

  <script>
    const collabBtn = document.getElementById("collabBtn");
    const collabModal = document.getElementById("collabModal");
    const closeBtn = document.querySelector(".close");
    const collabForm = document.getElementById("collabForm");

    collabBtn.addEventListener("click", function (e) {
      e.preventDefault();
      collabModal.style.display = "flex";
    });

    closeBtn.addEventListener("click", function () {
      collabModal.style.display = "none";
    });

    window.addEventListener("click", function (e) {
      if (e.target === collabModal) {
        collabModal.style.display = "none";
      }
    });

    collabForm.addEventListener("submit", async function (e) {
      e.preventDefault();

      const formData = new FormData(collabForm);

      try {
        const response = await fetch(collabForm.action, {
          method: "POST",
          body: formData,
          headers: {
            Accept: "application/json"
          }
        });

        if (response.ok) {
          alert("Collab request submitted.");
          collabForm.reset();
          collabModal.style.display = "none";
        } else {
          alert("Something went wrong. Please try again.");
        }
      } catch (error) {
        alert("Something went wrong. Please try again.");
      }
    });
  </script>

</body>
</html>
